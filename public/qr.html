<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR — Chiangrai Bandu Café 104</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&family=Playfair+Display:ital,wght@1,900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #e8a820;
            --gold-b: #f5c842;
            --gold-d: #a07010;
        }

        body {
            background: #0a0500;
            font-family: 'Sarabun', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            text-align: center;
        }

        @keyframes floatCup {

            0%,
            100% {
                transform: translateY(0) rotate(-2deg)
            }

            50% {
                transform: translateY(-14px) rotate(2deg)
            }
        }

        @keyframes shimmer {
            0% {
                background-position: 0%
            }

            100% {
                background-position: 200%
            }
        }

        @keyframes glowRing {

            0%,
            100% {
                opacity: .25;
                transform: translate(-50%, -50%) scale(1)
            }

            50% {
                opacity: .6;
                transform: translate(-50%, -50%) scale(1.05)
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .glow-orb {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200, 150, 20, .18) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        .cup {
            font-size: 90px;
            animation: floatCup 4s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(232, 168, 32, .9)) drop-shadow(0 0 80px rgba(200, 100, 0, .5));
            position: relative;
            z-index: 2;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(200, 150, 20, .2);
        }

        .shimmer-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 900;
            font-size: clamp(28px, 6vw, 44px);
            background: linear-gradient(90deg, var(--gold-d), var(--gold-b), var(--gold-d));
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .qr-box {
            background: #fff;
            padding: 18px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 0 60px rgba(232, 168, 32, .35), 0 0 0 4px rgba(200, 150, 20, .3);
            animation: fadeUp .6s .3s ease both;
        }

        .scan-hint {
            font-size: 15px;
            color: rgba(255, 255, 255, .65);
            font-weight: 300;
            letter-spacing: .5px;
            animation: fadeUp .6s .5s ease both;
        }

        .badge {
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--gold-d);
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="glow-orb"></div>

    <!-- Cup with rings -->
    <div style="position:relative;display:inline-block;margin-bottom:20px;animation:fadeUp .5s ease;">
        <div class="ring" style="width:160px;height:160px;animation:glowRing 3s ease-in-out infinite;"></div>
        <div class="ring" style="width:230px;height:230px;animation:glowRing 3s ease-in-out .7s infinite;"></div>
        <div class="ring" style="width:300px;height:300px;animation:glowRing 3s ease-in-out 1.4s infinite;"></div>
        <div class="cup">☕</div>
    </div>

    <div class="badge" style="margin-bottom:10px;">✦ Loyalty Card ✦</div>
    <div class="shimmer-title">Chiangrai Bandu Café<br><span
            style="font-family:'Sarabun',sans-serif;letter-spacing:3px;">104</span></div>
    <p
        style="font-size:16px;color:rgba(255,255,255,.6);font-weight:300;margin-bottom:28px;animation:fadeUp .5s .1s ease both;">
        สะสม 10 ดวง รับเครื่องดื่มฟรี 1 แก้ว 🎁
    </p>

    <!-- QR Code -->
    <div class="qr-box">
        <div id="qr"></div>
    </div>
    <p style="margin-top:18px;" class="scan-hint">📱 สแกน QR เพื่อเข้าสู่บัตรสะสมแสตมป์</p>

    <p id="url-display"
        style="margin-top:10px;font-size:11px;color:rgba(255,255,255,.25);font-family:monospace;animation:fadeUp .6s .6s ease both;">
    </p>

    <script>
        const url = window.location.origin + "/";
        document.getElementById("url-display").textContent = url;
        new QRCode(document.getElementById("qr"), {
            text: url,
            width: 220, height: 220,
            colorDark: "#0a0500",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M,
        });
    </script>
</body>

</html>
